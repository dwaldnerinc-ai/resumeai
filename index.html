<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Inter',system-ui,sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fadein{animation:fadein .18s ease}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
textarea:focus,input:focus,select:focus{outline:none;border-color:#3b82f6!important;box-shadow:0 0 0 3px rgba(59,130,246,0.12)!important}
button:active{transform:scale(0.97)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;flex-shrink:0}

/* ── PDF RESUME STYLES (DM Sans) ── */
.pdf-wrap{background:#fff;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:10.5pt;padding:36px 44px;max-width:800px;margin:0 auto;line-height:1.55}
.pdf-wrap *{color:inherit}
.pdf-name{font-size:22pt;font-weight:700;color:#0d2b4e;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:4px}
.pdf-tagline{font-size:11pt;color:#2e6da4;font-weight:600;text-align:center;margin-bottom:8px}
.pdf-contact{font-size:9.5pt;color:#555;display:flex;justify-content:center;flex-wrap:wrap;gap:4px 12px;margin-bottom:0}
.pdf-divider{border:none;border-top:3px solid #1e3a6e;margin:14px 0 16px}
.pdf-sec-title{font-size:9.5pt;font-weight:700;color:#0d2b4e;text-transform:uppercase;letter-spacing:.09em;border-bottom:1.5px solid #d0d8e4;padding-bottom:4px;margin-bottom:7px;text-align:center}
.pdf-exp-block{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eef0f4}
.pdf-exp-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.pdf-exp-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px 12px;margin-bottom:4px}
.pdf-exp-left{font-size:10.5pt;font-weight:700;color:#0d2b4e;flex:1 1 auto}
.pdf-exp-right{font-size:9.5pt;color:#2e6da4;font-weight:600;flex-shrink:0;white-space:nowrap}
.pdf-bullet{display:flex;gap:7px;margin-bottom:2px;font-size:10pt}
.pdf-bullet-dot{color:#2e6da4;flex-shrink:0;margin-top:1px}
.pdf-bullet-text{color:#222;line-height:1.55}
.pdf-text-line{font-size:10pt;margin-bottom:3px;color:#222;line-height:1.55}
.pdf-grid-table{width:100%;border-collapse:collapse;font-size:10pt;color:#222}
.pdf-grid-cell{padding:5px 8px 5px 0;width:33%;vertical-align:middle;color:#222}
.pdf-grid-item{display:flex;gap:0;align-items:center;color:#222}
.pdf-grid-item span{color:#222}
.pdf-grid-item .pdf-bullet-dot{display:none}

@media print{
  body>*:not(#print-area){display:none!important}
  #print-area{display:block!important;position:static}
  .pdf-wrap{padding:20px 30px;max-width:none}
}
</style>

<script>
// ─────────────────────────────────────────────────────────
// DATA & CONSTANTS
// ─────────────────────────────────────────────────────────
const STATUSES=[
  {key:"saved",    label:"Saved",    color:"#6b7280",bgd:"#1f2937",bgl:"#f3f4f6"},
  {key:"applied",  label:"Applied",  color:"#2563eb",bgd:"#0c1e3e",bgl:"#dbeafe"},
  {key:"interview",label:"Interview",color:"#d97706",bgd:"#1c1200",bgl:"#fef3c7"},
  {key:"offer",    label:"Offer",    color:"#16a34a",bgd:"#052e16",bgl:"#dcfce7"},
  {key:"rejected", label:"Rejected", color:"#dc2626",bgd:"#3b1212",bgl:"#fee2e2"},
  {key:"withdrawn",label:"Withdrawn",color:"#7c3aed",bgd:"#1e1040",bgl:"#ede9fe"},
];
const smeta=k=>STATUSES.find(s=>s.key===k)||STATUSES[0];

const SEED_APPS=[];


const TONE_RULES={
  natural:`VOICE (critical): Write like a confident human — not a corporate AI. Plain direct language. AVOID: spearheaded, leveraged, utilized, orchestrated, championed, fostered, robust, seamless, synergy, dynamic, innovative, results-driven, passionate, proven track record, end-to-end, holistic, transformative. Use simple verbs: Led, Built, Managed, Reduced, Saved, Improved, Delivered, Cut, Launched.`,
  bold:`VOICE: Confident, direct, punchy. Short powerful bullets. No filler. No buzzwords. No passive voice.`,
  polished:`VOICE: Professional and structured. Avoid extreme buzzwords. Strong action verbs, quantify where possible.`
};

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
const S={
  dark:true, tab:"resume",
  raw:"", polished:"", resumeView:"edit", tone:"natural",
  ci:{name:"",tagline:"",phone:"",email:"",location:"Vancouver, BC",linkedin:""},
  showCi:false, load:"", copied:"", refineText:"", polishError:"", apiKey:"", apiKeyError:false, showApiKey:false,
  selectedJob:null, posting:"", tailored:"", cover:"", applyOut:"resume", genWhat:"both",
  apps:[], storageReady:false, showForm:false, editId:null, fd:{}, filterSt:"all", expandedApp:null,
  searchResults:[], searchDone:false, searchKw:"", searchLoc:"Vancouver, BC", searchType:[],
  addedJobs:new Set(), aiSuggestions:[], aiSuggestionsError:"", recentlyAdded:[], addToast:"", pastePosting:"",
  intJob:null, intRound:"prescreen", intQs:[], mockQ:"", mockA:"", mockFb:"", intLoad:false,
  urlImport:"", urlImportPaste:"", urlImportStatus:"", showUrlPaste:false,
};

// ─────────────────────────────────────────────────────────
// PERSISTENCE (localStorage)
// ─────────────────────────────────────────────────────────
function lsGet(k,fallback=null){try{const v=localStorage.getItem(k);return v!==null?v:fallback;}catch{return fallback;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch{}}
function lsDel(k){try{localStorage.removeItem(k);}catch{}}

let _saveTimer={};
function debounceSave(key,val,delay=800){
  clearTimeout(_saveTimer[key]);
  _saveTimer[key]=setTimeout(()=>lsSet(key,val),delay);
}

function loadAll(){
  const apps=lsGet("tracker-apps-v2");
  S.apps=apps?JSON.parse(apps):[];
  if(!apps)lsSet("tracker-apps-v2",JSON.stringify([]));

  const raw=lsGet("resume-raw",""); S.raw=raw;
  const pol=lsGet("resume-polished",""); S.polished=pol;
  if(pol)S.resumeView="preview";
  const ci=lsGet("resume-ci"); if(ci)S.ci=JSON.parse(ci);
  const tone=lsGet("resume-tone"); if(tone)S.tone=tone;
  const dark=lsGet("app-dark"); if(dark!==null)S.dark=(dark==="true");
  const posting=lsGet("apply-posting",""); S.posting=posting;
  S.apiKey=lsGet("api-key","")||"";
  const tailored=lsGet("apply-tailored",""); S.tailored=tailored;
  const cover=lsGet("apply-cover",""); S.cover=cover;
  if(tailored||cover) S.applyOut=cover&&!tailored?"cover":"resume";
  S.storageReady=true;
}

// ─────────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────────
function t(){
  const d=S.dark;
  return d?{
    appBg:"#0d1117",hBg:"#161c27",hBorder:"#21293a",
    card:"#161c27",cardB:"#21293a",inBg:"#0d1117",inB:"#21293a",
    text:"#e8edf5",sub:"#8b95a8",muted:"#4b5563",
    active:{bg:"#0c1e3e",border:"#1e40af",text:"#93c5fd"},
    done:{bg:"#052e16",border:"#166534",text:"#4ade80"},
    idle:{bg:"#161c27",border:"#21293a",text:"#4b5563"},
    outBg:"#0d1117",outB:"#21293a",
    ghost:{bg:"#1f2937",border:"#374151",text:"#d1d5db"},
    danger:{bg:"#3b1212",border:"#7f1d1d",text:"#f87171"},
    warn:{bg:"#1c1200",border:"#854d0e",text:"#fbbf24"},
    tag:{bg:"#0c1e3e",text:"#93c5fd",border:"#1e40af"},
    div:"#21293a",cmpB:"#1e3a5f",cmpL:"#93c5fd",
  }:{
    appBg:"#f4f6fa",hBg:"#fff",hBorder:"#e2e6ee",
    card:"#fff",cardB:"#e2e6ee",inBg:"#f8f9fc",inB:"#d1d9e6",
    text:"#111827",sub:"#6b7280",muted:"#9ca3af",
    active:{bg:"#eff6ff",border:"#93c5fd",text:"#1d4ed8"},
    done:{bg:"#f0fdf4",border:"#86efac",text:"#15803d"},
    idle:{bg:"#f9fafb",border:"#e5e7eb",text:"#6b7280"},
    outBg:"#f8f9fc",outB:"#e2e6ee",
    ghost:{bg:"#f3f4f6",border:"#d1d9e6",text:"#374151"},
    danger:{bg:"#fee2e2",border:"#fca5a5",text:"#dc2626"},
    warn:{bg:"#fffbeb",border:"#fcd34d",text:"#92400e"},
    tag:{bg:"#eff6ff",text:"#1d4ed8",border:"#bfdbfe"},
    div:"#e2e6ee",cmpB:"#bfdbfe",cmpL:"#2563eb",
  };
}

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="htmlFor")el.htmlFor=v;
    else if(k==="disabled")el.disabled=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"||tag==="select"))el.value=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else if(k==="href"){el.href=v;}
    else if(k==="target")el.target=v;
    else if(k==="rel")el.rel=v;
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c===null||c===undefined)continue;
    if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(String(c)));
    else el.appendChild(c);
  }
  return el;
}
function div(attrs={},children=[])     {return h("div",attrs,children);}
function span(attrs={},children=[])    {return h("span",attrs,children);}
function btn(label,style_obj={},onclick=()=>{}){
  const b=h("button",{style:{cursor:"pointer",...style_obj},onClick:onclick});
  if(typeof label==="string")b.textContent=label;
  else if(label instanceof Element)b.appendChild(label);
  return b;
}
function txt(content,style_obj={}){return span({style:style_obj},[content]);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

async function callAI(sys,usr){
  const key=(S.apiKey||lsGet("api-key","")).trim();
  if(!key){S.apiKeyError=true;rerender();throw new Error("No API key — click the key button to add one.");}
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:sys,messages:[{role:"user",content:usr}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API error");
  return d.content?.map(b=>b.text||"").join("")||"";
}

function spinEl(){
  return span({className:"spin"});
}

function isDone(s){
  return {resume:!!S.polished,search:S.searchDone,board:S.apps.length>0,apply:!!(S.tailored||S.cover),tracker:S.apps.some(a=>a.status!=="saved"),interview:S.intQs.length>0}[s]||false;
}

function matchColor(m){return m>=90?"#16a34a":m>=80?"#2563eb":m>=70?"#d97706":"#6b7280";}
function matchBg(m){const d=S.dark;return m>=90?(d?"#052e16":"#f0fdf4"):m>=80?(d?"#0c1e3e":"#eff6ff"):m>=70?(d?"#1c1200":"#fffbeb"):(d?"#1f2937":"#f3f4f6");}

// ─────────────────────────────────────────────────────────
// PDF RESUME RENDERER
// ─────────────────────────────────────────────────────────
function buildPDFHTML(text,ci){
  // Parse all lines — first section before an ALL CAPS heading goes to header pool
  const allLines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const sections=[];
  let cur=null;
  allLines.forEach(line=>{
    const isH=/^[A-Z][A-Z\s&\/,\-:.']{3,}$/.test(line)&&line===line.toUpperCase()&&line.length<60;
    if(isH){if(cur)sections.push(cur);cur={title:line,items:[]};}
    else if(cur){
      if(line.startsWith("\u2022")||line.startsWith("\u2013")||line.startsWith("-"))cur.items.push({type:"bullet",text:line.replace(/^[\u2022\u2013\-]\s*/,"")});
      else cur.items.push({type:"text",text:line});
    }else{if(!cur)cur={title:"__hdr__",items:[]};cur.items.push({type:"text",text:line});}
  });
  if(cur)sections.push(cur);

  // Extract header info from the __hdr__ section (lines before first section heading)
  const hdrItems=(sections.find(s=>s.title==="__hdr__")||{items:[]}).items.map(i=>i.text);
  const rest=sections.filter(s=>s.title!=="__hdr__");

  // Parse name, tagline, contact from header lines
  let name="",tagline="",contactItems=[];
  hdrItems.forEach((line,i)=>{
    if(!name&&/^[A-Z][a-z]/.test(line)&&line.split(" ").length>=2&&line.length<60&&!line.includes("|")&&!line.includes("@")&&!line.match(/\d{3}/)){
      name=line;
    } else if(!tagline&&(line.includes("|")||/Manager|Director|Engineer|Specialist|Analyst|Coordinator|Officer/i.test(line))){
      tagline=line;
    } else if(line.includes("@")||line.match(/\(?\d{3}\)?[\s.-]\d{3}/)||line.toLowerCase().includes("linkedin")||line.match(/[A-Z][a-z]+,\s*[A-Z]{2}/)||line.includes("\uD83D")||line.includes("\uD83C")||line.includes("\u260D")||line.includes("\u260F")||line.includes("\u2709")||line.includes("\uD83D\uDCCD")){
      contactItems.push(line);
    } else if(name&&!tagline&&line.length>20){
      tagline=line;
    }
  });

  // Fall back to S.ci values if not found in text, then placeholders
  if(!name)name=ci.name||"Your Name";
  if(!tagline)tagline=ci.tagline||"";

  // Build contact line from detected items or S.ci
  const phone=ci.phone||(contactItems.find(l=>l.match(/\(?\d{3}\)?[\s.-]\d{3}/)))||"";
  const email=ci.email||(contactItems.find(l=>l.includes("@")))||"";
  const location=ci.location||(contactItems.find(l=>l.match(/[A-Z][a-z]+,\s*[A-Z]{2}/)))||"";
  const linkedin=ci.linkedin||(contactItems.find(l=>l.toLowerCase().includes("linkedin")))||"";

  const contactParts=[
    location?`<span class="pdf-contact-item pdf-ci-location">\uD83D\uDCCD ${esc(location)}</span>`:"",
    phone?`<span class="pdf-contact-item pdf-ci-phone">\uD83D\uDCDE ${esc(phone)}</span>`:"",
    email?`<span class="pdf-contact-item pdf-ci-email">\u2709 ${esc(email)}</span>`:"",
    linkedin?`<span class="pdf-contact-item pdf-ci-linkedin">\uD83D\uDD17 ${esc(linkedin)}</span>`:"",
  ].filter(Boolean).join('<span style="color:#ccc"> | </span>');



  function renderExp(items){
    const blocks=[];let block=null;
    const isSubLine=(tx)=>/\d{4}/.test(tx)||tx.includes(" – ")||tx.includes(" - ")||tx.includes("Present")||tx.includes("present")||(tx.length<70&&block&&block.bullets.length===0&&block.left);
    items.forEach(it=>{
      if(it.type==="bullet"){if(!block)block={left:"",right:"",bullets:[]};block.bullets.push(it.text);}
      else{const tr=it.text.trim();if(!block){block={left:tr,right:"",bullets:[]};}
      else if(block.bullets.length===0&&block.left&&!block.right&&isSubLine(tr)){block.right=tr;}
      else{if(block.left||block.bullets.length>0)blocks.push(block);block={left:tr,right:"",bullets:[]};}}
    });
    if(block&&(block.left||block.bullets.length>0))blocks.push(block);
    return blocks.map((b,i)=>{
      const isLast=i===blocks.length-1;
      return `<div class="pdf-exp-block"${isLast?' style="border-bottom:none;margin-bottom:0;padding-bottom:0"':''}>
        ${(b.left||b.right)?`<div class="pdf-exp-header">
          <span class="pdf-exp-left">${esc(b.left)}</span>
          ${b.right?`<span class="pdf-exp-right">${esc(b.right)}</span>`:""}
        </div>`:""}
        ${b.bullets.map(bl=>`<div class="pdf-bullet"><span class="pdf-bullet-dot">▪</span><span class="pdf-bullet-text">${esc(bl)}</span></div>`).join("")}
      </div>`;
    }).join("");
  }

  function renderGrid(items){
    const entries=items.map(it=>it.text).filter(Boolean);
    while(entries.length%3!==0)entries.push("");
    const rows=[];
    for(let i=0;i<entries.length;i+=3)rows.push(entries.slice(i,i+3));
    return`<table class="pdf-grid-table"><tbody>${rows.map(row=>`<tr>${row.map(cell=>`<td class="pdf-grid-cell">${cell?`<div class="pdf-grid-item"><span class="pdf-bullet-dot">▪</span><span>${esc(cell)}</span></div>`:""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  }

  const GRID_KEYS=["EXPERTISE","SKILLS","CERTIF"];
  const sectionsHTML=rest.map(sec=>{
    const isGrid=GRID_KEYS.some(k=>sec.title.toUpperCase().includes(k));
    const isExp=sec.title.includes("EXPERIENCE");
    let bodyHTML="";
    if(isExp)bodyHTML=renderExp(sec.items);
    else if(isGrid)bodyHTML=renderGrid(sec.items);
    else bodyHTML=sec.items.map(it=>it.type==="bullet"
      ?`<div class="pdf-bullet"><span class="pdf-bullet-dot">▪</span><span class="pdf-bullet-text">${esc(it.text)}</span></div>`
      :`<div class="pdf-text-line">${esc(it.text)}</div>`
    ).join("");
    return`<div style="margin-bottom:13px"><div class="pdf-sec-title">${esc(sec.title)}</div>${bodyHTML}</div>`;
  }).join("");

  return`<div class="pdf-wrap">
    <div class="pdf-name">${esc(name)}</div>
    ${tagline?`<div class="pdf-tagline">${esc(tagline)}</div>`:""}
    ${contactParts?`<div class="pdf-contact">${contactParts}</div>`:""}
    <hr class="pdf-divider"/>
    ${sectionsHTML}
  </div>`;
}

// EDITABLE PDF HELPER
// ─────────────────────────────────────────────────────────
function wireEditable(previewBox,getText,onSave){
  let editing=false;
  let undoStack=[];

  function extractText(){
    const lines=[];
    // Skip header elements — name/tagline/contact live in S.ci, not the body text
    previewBox.querySelectorAll(".pdf-sec-title,.pdf-exp-left,.pdf-exp-right,.pdf-bullet-text,.pdf-text-line").forEach(el=>{
      const tx=el.innerText.trim();if(!tx)return;
      if(el.classList.contains("pdf-sec-title"))lines.push("\n"+tx.toUpperCase());
      else if(el.classList.contains("pdf-bullet-text"))lines.push("\u2022 "+tx);
      else lines.push(tx);
    });
    return lines.join("\n").trim();
  }

  function syncCiFromHeader(){
    // Sync edited header fields back to S.ci using specific element classes
    const nameEl=previewBox.querySelector(".pdf-name");
    const tagEl=previewBox.querySelector(".pdf-tagline");
    const locationEl=previewBox.querySelector(".pdf-ci-location");
    const phoneEl=previewBox.querySelector(".pdf-ci-phone");
    const emailEl=previewBox.querySelector(".pdf-ci-email");
    const linkedinEl=previewBox.querySelector(".pdf-ci-linkedin");

    function clean(el,prefix){
      if(!el)return null;
      // Remove the emoji prefix (📍 📞 ✉ 🔗) to get just the value
      return el.innerText.replace(prefix,"").trim();
    }

    const updates={};
    if(nameEl)updates.name=nameEl.innerText.trim();
    if(tagEl)updates.tagline=tagEl.innerText.trim();
    if(locationEl)updates.location=clean(locationEl,"📍");
    if(phoneEl)updates.phone=clean(phoneEl,"📞");
    if(emailEl)updates.email=clean(emailEl,"✉");
    // If linkedin element is gone (user deleted it) or empty, clear it
    updates.linkedin=linkedinEl?clean(linkedinEl,"🔗"):"";

    S.ci={...S.ci,...updates};
    lsSet("resume-ci",JSON.stringify(S.ci));
  }

  // ── Toolbar: Edit / Save / Revert / Undo ──
  const toolbar=div({style:{
    position:"absolute",top:"10px",right:"10px",display:"flex",gap:"6px",
    alignItems:"center",zIndex:"10",
  }});

  const editBtn=h("button",{style:{
    fontSize:"11px",padding:"4px 11px",borderRadius:"6px",cursor:"pointer",
    border:"1px solid #374151",background:"rgba(17,24,39,0.88)",color:"#e5e7eb",
    fontFamily:"inherit",fontWeight:"600",display:"flex",alignItems:"center",gap:"5px",
  }}); editBtn.textContent="\u270E Edit";

  const saveBtn=h("button",{style:{
    fontSize:"11px",padding:"4px 11px",borderRadius:"6px",cursor:"pointer",
    border:"1px solid #166534",background:"#052e16",color:"#4ade80",
    fontFamily:"inherit",fontWeight:"600",display:"none",
  }}); saveBtn.textContent="\u2713 Save";

  const revertBtn=h("button",{style:{
    fontSize:"11px",padding:"4px 11px",borderRadius:"6px",cursor:"pointer",
    border:"1px solid #374151",background:"rgba(17,24,39,0.88)",color:"#fca5a5",
    fontFamily:"inherit",fontWeight:"600",display:"none",
  }}); revertBtn.textContent="\u21BA Revert";

  const undoBtn=h("button",{style:{
    fontSize:"11px",padding:"4px 11px",borderRadius:"6px",cursor:"pointer",
    border:"1px solid #374151",background:"rgba(17,24,39,0.88)",color:"#93c5fd",
    fontFamily:"inherit",fontWeight:"600",display:"none",
  }}); undoBtn.textContent="\u21B6 Undo";

  function startEdit(){
    const wrap=previewBox.querySelector(".pdf-wrap");
    if(!wrap)return;
    undoStack.push(getText()); // snapshot before editing
    undoBtn.style.display=undoStack.length>0?"":"none";
    editing=true;
    wrap.contentEditable="true";
    wrap.spellcheck=true;
    wrap.style.outline="2px solid #2563eb44";
    wrap.style.borderRadius="4px";
    wrap.style.cursor="text";
    wrap.style.caretColor="#2563eb";
    editBtn.style.display="none";
    saveBtn.style.display="";
    revertBtn.style.display="";
    undoBtn.style.display=undoStack.length>1?"":"none";
    setTimeout(()=>wrap.focus(),50);
  }

  function stopEdit(){
    const wrap=previewBox.querySelector(".pdf-wrap");
    if(!wrap)return;
    editing=false;
    wrap.contentEditable="false";
    wrap.style.outline="none";
    wrap.style.cursor="default";
    editBtn.style.display="";
    saveBtn.style.display="none";
    revertBtn.style.display="none";
    undoBtn.style.display="none";
  }

  editBtn.addEventListener("click",()=>startEdit());

  saveBtn.addEventListener("click",()=>{
    syncCiFromHeader();
    const newText=extractText();
    if(newText&&newText!==getText())onSave(newText);
    stopEdit();
  });

  revertBtn.addEventListener("click",()=>{
    if(!confirm("Revert to the last saved version? Your current edits will be lost."))return;
    // Restore from the snapshot taken when editing started
    const prev=undoStack[undoStack.length-1];
    if(prev){
      onSave(prev);
      // Rebuild the preview with the reverted text
      const wrap=previewBox.querySelector(".pdf-wrap");
      if(wrap){wrap.contentEditable="false";}
      stopEdit();
      rerender(); // re-render to show reverted version
    }
  });

  undoBtn.addEventListener("click",()=>{
    if(undoStack.length===0)return;
    const prev=undoStack.pop();
    onSave(prev);
    stopEdit();
    rerender();
  });

  toolbar.appendChild(undoBtn);
  toolbar.appendChild(revertBtn);
  toolbar.appendChild(saveBtn);
  toolbar.appendChild(editBtn);
  previewBox.appendChild(toolbar);

  // Ctrl+S to save, Escape to revert while editing
  previewBox.addEventListener("keydown",e=>{
    if(!editing)return;
    if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();saveBtn.click();}
    if(e.key==="Escape"){revertBtn.click();}
  });
}

          catch{S.intQs=[{category:"Error",question:"Could not parse. Try again.",tip:""}];}
        }catch{S.intQs=[{category:"Error",question:"Error generating.",tip:""}];}
        S.intLoad=false;rerender();
      });b.disabled=S.intLoad;return b;
    })();

    let qSection=null;
    if(S.intQs.length>0){
      const job=S.intJob?S.apps.find(a=>a.id===S.intJob):null;
      const cats=["General PM & Ops","Role-Specific"];
      qSection=div({style:card_s},[
        div({style:{fontSize:"14px",fontWeight:"700",marginBottom:"16px"}},[
          S.intRound==="prescreen"?"Pre-screen questions":S.intRound==="first"?"First interview questions":"Second interview / panel questions",
          job?span({style:{fontSize:"12px",color:T.sub,fontWeight:"400",marginLeft:"8px"}},[" — "+job.company]):null,
        ].filter(Boolean)),
        ...cats.map(cat=>{
          const qs=S.intQs.filter(q=>q.category===cat);
          if(!qs.length)return null;
          return div({style:{marginBottom:"20px"}},[
            div({style:{fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",color:cat==="Role-Specific"?(S.dark?"#93c5fd":"#1d4ed8"):T.muted,marginBottom:"10px",paddingBottom:"6px",borderBottom:`1px solid ${T.div}`}},[cat]),
            ...qs.map(q=>div({style:{marginBottom:"10px",padding:"12px 14px",background:T.inBg,border:`1px solid ${T.inB}`,borderRadius:"9px"}},[
              div({style:{fontSize:"13px",fontWeight:"600",color:T.text,marginBottom:"5px",lineHeight:"1.5"}},[q.question]),
              q.tip?div({style:{fontSize:"12px",color:T.sub,lineHeight:"1.6",borderLeft:`2px solid ${S.dark?"#1e40af":"#93c5fd"}`,paddingLeft:"10px",marginBottom:"6px"}},["💡 "+q.tip]):null,
              pillBtn("Practice this →",S.mockQ===q.question,"#7c3aed",()=>{S.mockQ=q.question;S.mockA="";S.mockFb="";rerender();},{padding:"4px 11px",borderRadius:"7px",fontSize:"11px"}),
            ].filter(Boolean))),
          ]);
        }).filter(Boolean),
      ]);
    }

    let mockSection=null;
    if(S.mockQ){
      const submitFb=mkBtn("purple",S.load==="mock"?(()=>{const w=div({style:{display:"flex",alignItems:"center",gap:"6px"}});w.appendChild(spinEl());w.appendChild(document.createTextNode("Analysing…"));return w;})():"Get feedback",async()=>{
        if(!S.mockA.trim()||S.load==="mock")return;
        S.load="mock";S.mockFb="";rerender();
        try{const r=await callAI(`Interview coach. Honest constructive feedback. Format: what worked (1-2 sentences), what to improve (1-2 sentences), better version of the answer (2-3 sentences). Under 200 words.`,`Q: ${S.mockQ}\n\nAnswer: ${S.mockA}`);S.mockFb=r;}
        catch{S.mockFb="Error. Try again.";}
        S.load="";rerender();
      });submitFb.disabled=S.load==="mock"||!S.mockA.trim();

      mockSection=div({style:{...card_s,border:`1.5px solid ${S.dark?"#7c3aed":"#a78bfa"}`}},[
        div({style:{fontSize:"13px",fontWeight:"700",color:S.dark?"#c4b5fd":"#6d28d9",marginBottom:"6px"}},["Mock interview"]),
        div({style:{fontSize:"14px",fontWeight:"600",color:T.text,marginBottom:"12px",lineHeight:"1.5",padding:"10px 14px",background:T.inBg,borderRadius:"8px",border:`1px solid ${T.inB}`}},[S.mockQ]),
        mkLabel("Your answer"),
        mkTextarea(S.mockA,v=>{S.mockA=v;},110,"Type your answer as if you're in the interview…"),
        div({style:{marginTop:"10px",display:"flex",gap:"8px"}},[
          submitFb,
          mkBtn("ghost","Clear",()=>{S.mockQ="";S.mockA="";S.mockFb="";rerender();},{fontSize:"12px",padding:"7px 14px"}),
        ]),
        S.mockFb?div({style:{marginTop:"14px",padding:"14px 16px",background:S.dark?"#052e16":"#f0fdf4",border:`1px solid ${S.dark?"#166534":"#86efac"}`,borderRadius:"9px"}},[
          div({style:{fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",color:S.dark?"#4ade80":"#15803d",marginBottom:"8px"}},["Coach feedback"]),
          div({style:{fontSize:"13px",color:T.text,lineHeight:"1.75",whiteSpace:"pre-wrap"}},[S.mockFb]),
        ]):null,
      ].filter(Boolean));
    }

    content=div({},[
      div({style:card_s},[
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}},[jobSelect,roundPills]),
        genQsBtn,
      ]),
      qSection,mockSection,
    ].filter(Boolean));
  }

  // ── ASSEMBLE ──
  const main=div({style:{maxWidth:"1080px",margin:"0 auto",padding:"24px 20px"}},[tabBar,content]);

  const showSetup=!hasKey&&!lsGet("setup-dismissed","");
  const setupModal=showSetup?div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.75)",zIndex:"200",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}},[
    div({style:{background:S.dark?"#161c27":"#fff",borderRadius:"16px",padding:"32px",maxWidth:"460px",width:"100%",boxShadow:"0 24px 80px rgba(0,0,0,0.5)"}},[
      div({style:{fontSize:"26px",marginBottom:"10px"}},["🚀"]),
      div({style:{fontSize:"18px",fontWeight:"700",color:T.text,marginBottom:"8px"}},["Welcome to ResumeAI"]),
      div({style:{fontSize:"13px",color:T.sub,lineHeight:"1.7",marginBottom:"18px"}},["AI-powered resume polishing, job tailoring, and interview prep — all running locally on your device. To enable the AI you need a free Anthropic API key."]),
      div({style:{background:S.dark?"#0d1117":"#f4f6fa",border:`1px solid ${T.inB}`,borderRadius:"10px",padding:"14px 16px",marginBottom:"18px"}},[
        div({style:{fontSize:"11px",fontWeight:"700",color:T.muted,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"10px"}},["One-time setup"]),
        ...[["1","Visit console.anthropic.com/settings/keys"],["2","Click Create Key and copy it"],["3","Paste it below and click Save"]].map(([n,txt])=>
          div({style:{display:"flex",gap:"10px",alignItems:"center",marginBottom:"7px"}},[
            span({style:{width:"20px",height:"20px",borderRadius:"50%",background:"#2563eb",color:"#fff",fontSize:"10px",fontWeight:"700",display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},[n]),
            span({style:{fontSize:"13px",color:T.text}},[txt]),
          ])
        ),
      ]),
      div({style:{display:"flex",gap:"8px",marginBottom:"10px"}},[
        (()=>{
          const inp=h("input",{style:{flex:"1",padding:"10px 12px",borderRadius:"8px",fontSize:"13px",border:`1px solid ${T.inB}`,background:T.inBg,color:T.text},placeholder:"sk-ant-api03-…",type:"password"});
          inp.value=S.apiKey||"";
          inp.addEventListener("input",e=>{S.apiKey=e.target.value;});
          inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&S.apiKey.trim()){lsSet("api-key",S.apiKey.trim());lsSet("setup-dismissed","1");rerender();}});
          setTimeout(()=>inp.focus(),120);
          return inp;
        })(),
        h("button",{style:{padding:"10px 18px",borderRadius:"8px",background:"#2563eb",color:"#fff",fontSize:"13px",fontWeight:"700",border:"none",cursor:"pointer",flexShrink:"0"},
          onClick:()=>{if(S.apiKey.trim()){lsSet("api-key",S.apiKey.trim());lsSet("setup-dismissed","1");rerender();}else alert("Please paste your API key first.");}},
          ["Save & start"]),
      ]),
      h("a",{href:"https://console.anthropic.com/settings/keys",target:"_blank",style:{fontSize:"12px",color:"#2563eb",display:"block",marginBottom:"12px"}},["Open Anthropic console →"]),
      h("button",{style:{fontSize:"12px",color:T.muted,background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline"},
        onClick:()=>{lsSet("setup-dismissed","1");rerender();}},
        ["Skip for now — I’ll add it later"]),
    ]),
  ]):null;

  const noKeyBanner=(!hasKey&&lsGet("setup-dismissed",""))?div({style:{background:T.warn.bg,borderBottom:`1px solid ${T.warn.border}`,padding:"8px 24px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},[
    span({style:{fontSize:"12px",color:T.warn.text}},["⚠ AI features require an API key — "]),
    h("button",{style:{fontSize:"12px",color:T.warn.text,background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline",padding:"0"},onClick:()=>{S.showApiKey=true;rerender();}},
      ["add it here"]),
    span({style:{fontSize:"12px",color:T.warn.text}},[ " or visit "]),
    h("a",{href:"https://console.anthropic.com/settings/keys",target:"_blank",style:{fontSize:"12px",color:T.warn.text}},["console.anthropic.com"]),
  ]):null;

  const root=div({style:{minHeight:"100vh",background:T.appBg,color:T.text,fontFamily:"'Inter',system-ui,sans-serif"}},[header,noKeyBanner,main,setupModal]);

  app.innerHTML="";
  app.appendChild(root);
}

// ─────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────
loadAll();
_render();
</script>
